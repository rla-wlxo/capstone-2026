<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seoul Random Dice - 여유로운 핫플</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h2>🗺️ 내 근처 "여유로운" 핫플 찾기</h2>
        <p>현재 위치를 기반으로 사람이 적은 장소를 추천합니다.</p>
        
        <div style="margin-bottom: 15px;">
            <label for="distanceSelect">검색 범위: </label>
            <select id="distanceSelect">
                <option value="1">1km 이내</option>
                <option value="3" selected>3km 이내</option>
                <option value="5">5km 이내</option>
                <option value="10">10km 이내</option>
            </select>
        </div>

        <button id="recommendBtn">내 위치 기반 추천받기</button>

        <div id="result" style="display: none;">
            <div id="recommendationList">
                </div>
        </div>
    </div>

    <script src="/js/main.js"></script>
</body>
</html>
