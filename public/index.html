<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>한적한 핫플 찾기 - 덜 붐비는 곳 추천</title>
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; background: #007bff; color: white; border: none; border-radius: 8px; }
        #result { margin-top: 20px; padding: 15px; border: 1px solid #ddd; border-radius: 8px; display: none; }
        .congest-여유 { color: #28a745; font-weight: bold; }
        .congest-보통 { color: #ffc107; font-weight: bold; }
        .congest-붐빔 { color: #dc3545; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🗺️ 내 근처 "여유로운" 핫플 찾기</h2>
    <p>현재 위치를 기반으로 사람이 적은 장소를 추천합니다.</p>
    
    <button onclick="findNearbyHotspot()">내 위치 기반 추천받기</button>

    <div id="result">
        <h3 id="placeName">장소 이름</h3>
        <p>현재 혼잡도: <span id="congestLevel"></span></p>
        <p id="detailMsg">상세 메시지 내용이 표시됩니다.</p>
        <small>업데이트 시간: <span id="updateTime"></span></small>
    </div>
</div>

<script>
    async function findNearbyHotspot() {
        const resultDiv = document.getElementById('result');
        
        // 1. 브라우저 지오로케이션으로 좌표 가져오기
        if (!navigator.geolocation) {
            alert("브라우저가 위치 정보를 지원하지 않습니다.");
            return;
        }

        navigator.geolocation.getCurrentPosition(async (position) => {
            const { latitude, longitude } = position.coords;
            console.log(`현재 위치: ${latitude}, ${longitude}`);

            try {
                // 2. 백엔드 API 호출 (지금은 테스트용으로 '강남역'을 호출하지만, 
                // 나중에 서버에서 좌표를 받아 거리를 계산하는 로직을 추가해야 합니다.)
                const response = await fetch(`http://localhost:3000/api/test/강남역`);
                const data = await response.json();

                if (response.ok) {
                    // 3. 화면에 데이터 뿌려주기
                    resultDiv.style.display = 'block';
                    document.getElementById('placeName').innerText = `📍 ${data.장소}`;
                    const levelSpan = document.getElementById('congestLevel');
                    levelSpan.innerText = data.혼잡도;
                    levelSpan.className = `congest-${data.혼잡도}`; // 여유/보통/붐빔 색상 변경
                    document.getElementById('detailMsg').innerText = data.상세메시지;
                    document.getElementById('updateTime').innerText = data.업데이트시간;
                } else {
                    alert("데이터를 가져오는 데 실패했습니다.");
                }
            } catch (error) {
                console.error("에러 발생:", error);
                alert("서버와 통신 중 에러가 발생했습니다.");
            }
        });
    }
</script>

</body>
</html>
