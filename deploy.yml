name: Docker Build and Push

on:
  push:
    branches: [ "main" ] # main 브랜치에 push 될 때마다 실행

jobs:
  build:
    runs-on: ubuntu-latest # GitHub이 빌려주는 가상 컴퓨터

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v3

      - name: 도커 허브 로그인
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 이미지 빌드 및 푸시
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/seoul-random-dice:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/seoul-random-dice:latest
          # ... (기존 빌드 및 푸시 단계 이후에 추가)
      - name: 서버 접속 및 배포 실행
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. 기존 컨테이너 중지 및 삭제
            docker stop seoul-dice || true
            docker rm seoul-dice || true
            # 2. 최신 이미지 내려받기
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/seoul-random-dice:latest
            # 3. 새 컨테이너 실행
            docker run -d --name seoul-dice -p 80:3000 ${{ secrets.DOCKERHUB_USERNAME }}/seoul-random-dice:latest